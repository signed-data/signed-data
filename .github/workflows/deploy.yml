name: Deploy site

on:
  push:
    branches: [main]
    paths:
      - "site/**"
      - "infra/**"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

concurrency:
  group: deploy-signeddata-org-site
  cancel-in-progress: true

env:
  AWS_REGION: us-east-1
  STACK_NAME: SignedDataOrgHomeStack

jobs:
  deploy:
    name: CDK deploy + S3 sync + invalidation
    runs-on: ubuntu-latest
    environment: production

    defaults:
      run:
        working-directory: infra

    steps:
      - uses: actions/checkout@v4

      - name: Require production deploy variables
        env:
          ROLE_ARN: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          ACCOUNT_ID: ${{ vars.AWS_ACCOUNT_ID }}
        run: |
          set -euo pipefail
          if [ -z "${ROLE_ARN}" ] && [ -z "${ACCOUNT_ID}" ]; then
            echo "::error::Set GitHub Environment 'production' variables AWS_ACCOUNT_ID (preferred) or AWS_DEPLOY_ROLE_ARN."
            echo "Automate: run ./automate-deploy-setup.sh from the repo clone (aws + gh) — see README and infra/docs/github-oidc.md"
            exit 1
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: infra/package-lock.json

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN || format('arn:aws:iam::{0}:role/github-signeddata-org-home', vars.AWS_ACCOUNT_ID) }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install CDK dependencies
        run: npm ci

      - name: CDK deploy
        run: npx cdk deploy ${{ env.STACK_NAME }} --require-approval never

      - name: Resolve bucket and distribution
        id: resolve
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          BUCKET="${{ vars.SITE_BUCKET }}"
          DIST="${{ vars.CF_DISTRIBUTION_ID }}"
          if [ -z "$BUCKET" ] || [ -z "$DIST" ]; then
            echo "Resolving outputs from CloudFormation stack ${{ env.STACK_NAME }}..."
            BUCKET=$(aws cloudformation describe-stacks \
              --stack-name "${{ env.STACK_NAME }}" \
              --query "Stacks[0].Outputs[?OutputKey=='SiteBucketName'].OutputValue" \
              --output text)
            DIST=$(aws cloudformation describe-stacks \
              --stack-name "${{ env.STACK_NAME }}" \
              --query "Stacks[0].Outputs[?OutputKey=='DistributionId'].OutputValue" \
              --output text)
          fi
          echo "bucket=$BUCKET" >> "$GITHUB_OUTPUT"
          echo "distribution=$DIST" >> "$GITHUB_OUTPUT"

      - name: Sync site to S3
        working-directory: ${{ github.workspace }}
        run: |
          aws s3 sync site/ "s3://${{ steps.resolve.outputs.bucket }}/" \
            --delete \
            --cache-control "public, max-age=3600"

      - name: Invalidate CloudFront
        working-directory: ${{ github.workspace }}
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${{ steps.resolve.outputs.distribution }}" \
            --paths "/*"
