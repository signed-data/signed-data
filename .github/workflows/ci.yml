name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-site:
    name: Build Astro site
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: site

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: site/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build

  build-and-synth:
    name: TypeScript + CDK synth
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: infra

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: infra/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Compile TypeScript
        run: npm run build

      - name: CDK synth
        env:
          CDK_DEFAULT_REGION: us-east-1
        run: |
          set -euo pipefail
          if ! grep -q "hosted-zone:" cdk.context.json 2>/dev/null; then
            echo "::warning::infra/cdk.context.json has no Route53 lookup entries yet."
            echo "Run 'cd infra && npx cdk synth' with AWS credentials, then commit the updated cdk.context.json."
            exit 0
          fi
          # fromLookup requires explicit stack env; account is embedded in cached context keys
          export CDK_DEFAULT_ACCOUNT="$(
            grep -oE 'hosted-zone:account=[0-9]+' cdk.context.json | head -1 | cut -d= -f2
          )"
          if [ -z "${CDK_DEFAULT_ACCOUNT}" ]; then
            echo "::error::Could not parse AWS account id from cdk.context.json"
            exit 1
          fi
          npx cdk synth
